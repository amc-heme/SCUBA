# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }}) py=${{ matrix.config.python }}

    strategy:
      fail-fast: false
      matrix:
        config:
          #- { os: macOS-latest  , r: 'release', python: '3.9' }
          #- { os: windows-latest, r: 'release', python: '3.9' }
          #- { os: ubuntu-latest , r: 'release', python: '3.9' }

          #- { os: ubuntu-latest, r: 'oldrel-1', python: '3.9' }
          #- { os: ubuntu-latest, r: 'oldrel-2', python: '3.9' }
          #- { os: ubuntu-20.04,  r: '3.6',      python: '3.8' }
          # - { os: ubuntu-latest, r: 'devel'   , python: '3.8', http-user-agent: 'release' }

          #- { os: ubuntu-latest, r: 'release', python: '3.7'  }
          #- { os: ubuntu-latest, r: 'release', python: '3.8'  }
          #- { os: ubuntu-latest, r: 'release', python: '3.10' }
          #- { os: ubuntu-latest, r: 'release', python: '3.11' }
          - { os: macOS-latest, r: "release", python: "3.13" }
          - { os: windows-latest, r: "release", python: "3.13" }
          - { os: ubuntu-latest, r: "release", python: "3.13" }

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true
          # BPCells is not avaliable on CRAN
          # Must specify location to pull from via extra-repositories
          extra-repositories: "https://bnprks.r-universe.dev"

      - uses: actions/setup-python@v5
        if: matrix.config.python != 'debug'
        with:
          python-version: ${{ matrix.config.python }}

      # BPCells depends on HDF5. This is installed on each OS below.
      - name: Install HDF5 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install hdf5

      - name: Install HDF5 (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-dev

      # Powershell script for windows
      - name: Install HDF5 (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          # Install vcpkg HDF5
          vcpkg install hdf5:x64-windows
          # Set environment variables for BPCells compilation
          echo "HDF5_ROOT=C:\vcpkg\installed\x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "HDF5_INCLUDE_DIR=C:\vcpkg\installed\x64-windows\include" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "HDF5_LIBRARY_DIR=C:\vcpkg\installed\x64-windows\lib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            any::remotes
            any::devtools
          needs: check

      # # Install BPCells from GitHub
      # - name: Install BPCells
      #   shell: Rscript {0}
      #   run: |
      #     remotes::install_github("bnprks/BPCells/r")

      # - name: Verify BPCells installation
      #   shell: Rscript {0}
      #   run: |
      #     if (!requireNamespace("BPCells", quietly = TRUE)) {
      #       stop("BPCells package not found")
      #     }
      #     cat("BPCells version:", as.character(packageVersion("BPCells")), "\n")

      # Check installed packages
      - name: Check installed packages
        shell: Rscript {0}
        run: |
          devtools::session_info()

      - name: setup r-reticulate venv
        shell: Rscript {0}
        run: |

          library(reticulate)

          path_to_venv <- virtualenv_create(
            envname = "r-reticulate",
            python = Sys.which("python"), # placed on PATH by the setup-python action
            packages = c(
              "docutils", "pandas", "scipy", "matplotlib", "ipython",
              "tabulate", "plotly", "psutil", "kaleido", "wrapt",
              "anndata"
            )
          )

          writeLines(
            paste0("RETICULATE_PYTHON=", virtualenv_python(path_to_venv)),
            Sys.getenv("GITHUB_ENV"))

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          error-on: '"error"'
