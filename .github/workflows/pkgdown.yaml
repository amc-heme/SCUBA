# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          # BPCells is not avaliable on CRAN
          # Must specify location to pull from via extra-repositories
          extra-repositories: "https://bnprks.r-universe.dev"

      # Custom R dependency install process suggested by Claude
      # I can't get the R-lib action to install BPCells
      - name: Install pak
        run: |
          install.packages("pak", repos = sprintf("https://r-lib.github.io/p/pak/stable/%s/%s/%s", .Platform$pkgType, R.Version()$os, R.Version()$arch))
        shell: Rscript {0}

      - name: Install dependencies
        shell: Rscript {0}
        run: |
          pak::repo_add(bnprks = "https://bnprks.r-universe.dev")
          pak::pkg_install("any::rcmdcheck")
          pak::pkg_install("any::remotes")
          pak::pkg_install("any::devtools")
          pak::pkg_install("deps::.", dependencies = TRUE)

      # Install all R dependencies
      # - uses: r-lib/actions/setup-r-dependencies@v2
      #   with:
      #     # local::. runs devtools::install_local to install all dependencies
      #     # in the DESCRIPTION file of SCUBA
      #     # Additional packages:
      #     # pkgdown (part of standard workflow)
      #     # SASS CSS is used in user guide vignette
      #     extra-packages: |
      #       local::.
      #       any::pkgdown
      #       any::sass
      #       any::remotes
      #     needs: website

      # Set up Python environment to run anndata examples on website
      - uses: actions/setup-python@v4
        if: matrix.config.python != 'debug'
        with:
          python-version: ${{ matrix.config.python }}

      - name: setup r-reticulate venv
        shell: Rscript {0}
        run: |

          library(reticulate)

          path_to_venv <- virtualenv_create(
            envname = "r-reticulate",
            python = Sys.which("python"), # placed on PATH by the setup-python action
            packages = c(
              "docutils", "pandas", "scipy", "matplotlib", "ipython",
              "tabulate", "plotly", "psutil", "kaleido", "wrapt",
              "anndata"
            )
          )

          writeLines(
            paste0("RETICULATE_PYTHON=", virtualenv_python(path_to_venv)),
            Sys.getenv("GITHUB_ENV"))

      ## Steps below are standard workflow, unchanged from template
      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
